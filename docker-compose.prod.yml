services:
  app:
    build: .
    container_name: agenda_facil_app
    environment:
      DATABASE_URL: "postgresql://admin:password@postgres:5432/agenda_facil?schema=public"
      NODE_ENV: production
    depends_on:
      - postgres
      - redis

  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agenda_facil_frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: agenda_facil_proxy
    ports:
      - "8090:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - frontend

  postgres:
    image: postgres:15-alpine
    container_name: agenda_facil_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agenda_facil
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agenda_facil_redis

volumes:
  postgres_data:
