services:
  app:
    build: .
    container_name: agenda_facil_app
    environment:
      DATABASE_URL: "postgresql://admin:password@postgres:5432/agenda_facil?schema=public"
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    container_name: agenda_facil_frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: agenda_facil_proxy
    ports:
      - "8090:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - frontend

  postgres:
    image: postgres:15-alpine
    container_name: agenda_facil_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agenda_facil
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agenda_facil -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agenda_facil_redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
